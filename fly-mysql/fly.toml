app = "club-sportif-db"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  MYSQL_DATABASE = "club"
  MYSQL_ALLOW_EMPTY_PASSWORD = "yes"
  MARIADB_ALLOW_EMPTY_ROOT_PASSWORD = "yes"

[[mounts]]
  source = "mysql_data"
  destination = "/var/lib/mysql"
  initial_size = "1gb"

[[services]]
  internal_port = 3306
  protocol = "tcp"
  auto_stop_machines = false
  min_machines_running = 1

  [[services.tcp_checks]]
    interval = "15s"
    timeout  = "5s"
    grace_period = "60s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
