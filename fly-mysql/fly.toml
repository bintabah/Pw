app = "club-sportif-db"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  MYSQL_DATABASE = "club"
  MYSQL_ALLOW_EMPTY_PASSWORD = "yes"
  MARIADB_ALLOW_EMPTY_ROOT_PASSWORD = "yes"

[[mounts]]
  source = "mariadb_data"
  destination = "/var/lib/mysql"
  initial_size = "1gb"

[[restart]]
  policy = "always"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
