app = "club-sportif-mvc"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  DB_HOST = "club-sportif-db.internal"
  DB_NAME = "club"
  DB_USER = "root"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
