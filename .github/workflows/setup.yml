name: "Fly.io — Setup initial (lancer une seule fois)"

on:
  workflow_dispatch:

jobs:
  setup-mysql:
    name: "1. Déployer MySQL"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Créer l'app MySQL et le volume de données
        run: |
          fly apps create club-sportif-db --org personal 2>/dev/null || echo "App déjà existante"
          fly volumes create mysql_data --region cdg --size 1 --app club-sportif-db --yes 2>/dev/null || echo "Volume déjà existant"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Déployer MySQL avec les données de test
        run: fly deploy --config fly-mysql/fly.toml --app club-sportif-db
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  setup-mvc:
    name: "2. Déployer PHP MVC"
    runs-on: ubuntu-latest
    needs: setup-mysql
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Créer l'app PHP MVC
        run: fly apps create club-sportif-mvc --org personal 2>/dev/null || echo "App déjà existante"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Configurer les variables d'environnement
        run: |
          fly secrets set \
            DB_HOST=club-sportif-db.internal \
            DB_NAME=club \
            DB_USER=root \
            DB_PASSWORD="" \
            --app club-sportif-mvc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Déployer PHP MVC
        run: fly deploy --app club-sportif-mvc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  setup-symfony:
    name: "3. Déployer Symfony"
    runs-on: ubuntu-latest
    needs: setup-mysql
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Symfony

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Créer l'app Symfony
        run: fly apps create club-sportif-symfony --org personal 2>/dev/null || echo "App déjà existante"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Configurer les variables d'environnement
        run: |
          fly secrets set \
            DATABASE_URL="mysql://root:@club-sportif-db.internal:3306/club?serverVersion=8.0&charset=utf8mb4" \
            APP_SECRET="${{ secrets.APP_SECRET }}" \
            APP_ENV=prod \
            APP_DEBUG=0 \
            --app club-sportif-symfony
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Déployer Symfony
        working-directory: ./projetsymfony
        run: fly deploy --app club-sportif-symfony
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
