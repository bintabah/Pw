name: "Fly.io — Setup initial (lancer une seule fois)"

on:
  workflow_dispatch:

jobs:
  setup-mysql:
    name: "1. Déployer MySQL"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Nettoyer machines et volumes existants
        run: |
          flyctl apps create club-sportif-db --org personal 2>/dev/null || echo "App déjà existante"

          echo "Suppression des machines existantes..."
          for id in $(flyctl machines list --app club-sportif-db --json 2>/dev/null | jq -r '.[].id' 2>/dev/null); do
            flyctl machines destroy "$id" --force --app club-sportif-db 2>/dev/null || true
          done

          echo "Suppression des volumes existants..."
          for id in $(flyctl volumes list --app club-sportif-db --json 2>/dev/null | jq -r '.[].id' 2>/dev/null); do
            flyctl volumes destroy "$id" --yes 2>/dev/null || true
          done

          echo "Création d'un volume propre (mariadb_data)..."
          flyctl volumes create mariadb_data --region cdg --size 1 --app club-sportif-db --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Déployer MySQL avec les données de test
        run: |
          cp init.sql fly-mysql/
          cd fly-mysql
          flyctl deploy --app club-sportif-db --detach
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Attendre que MariaDB soit prêt (2 min)
        run: sleep 120

      - name: Vérifier les logs MariaDB
        run: flyctl logs --app club-sportif-db --no-tail 2>/dev/null || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  setup-mvc:
    name: "2. Déployer PHP MVC"
    runs-on: ubuntu-latest
    needs: setup-mysql
    steps:
      - uses: actions/checkout@v4

      - name: Installer flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Créer l'app PHP MVC
        run: flyctl apps create club-sportif-mvc --org personal 2>/dev/null || echo "App déjà existante"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Configurer les variables d'environnement
        run: |
          flyctl secrets set \
            DB_HOST=club-sportif-db.internal \
            DB_NAME=club \
            DB_USER=root \
            DB_PASSWORD="" \
            --app club-sportif-mvc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Déployer PHP MVC
        run: flyctl deploy --app club-sportif-mvc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  setup-symfony:
    name: "3. Déployer Symfony"
    runs-on: ubuntu-latest
    needs: setup-mysql
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Symfony

      - name: Installer flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Créer l'app Symfony
        run: flyctl apps create club-sportif-symfony --org personal 2>/dev/null || echo "App déjà existante"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Configurer les variables d'environnement
        run: |
          flyctl secrets set \
            DATABASE_URL="mysql://root:@club-sportif-db.internal:3306/club?serverVersion=mariadb-10.11.0&charset=utf8mb4" \
            APP_SECRET="${{ secrets.APP_SECRET }}" \
            APP_ENV=prod \
            APP_DEBUG=0 \
            --app club-sportif-symfony
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Déployer Symfony
        working-directory: ./projetsymfony
        run: flyctl deploy --app club-sportif-symfony
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
