name: "Deploy — PHP MVC vers Fly.io"

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".env.example"
      - "fly-mysql/**"
      - ".github/workflows/setup.yml"

jobs:
  deploy:
    name: Build & Deploy PHP MVC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Déployer sur Fly.io
        run: flyctl deploy --app club-sportif-mvc --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
