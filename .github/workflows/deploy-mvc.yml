name: "Deploy — PHP MVC vers Fly.io"

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".env.example"
      - "fly-mysql/**"
      - ".github/workflows/setup.yml"

jobs:
  deploy:
    name: Build & Deploy PHP MVC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Déployer sur Fly.io
        run: fly deploy --app club-sportif-mvc --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
