services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: club
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  php-mvc:
    build: .
    ports:
      - "8083:80"
    depends_on:
      mysql:
        condition: service_healthy

  symfony:
    build: ../Symfony/projetsymfony
    ports:
      - "8081:80"
    environment:
      DATABASE_URL: "mysql://root:@mysql:3306/club?serverVersion=8.0&charset=utf8mb4"
    depends_on:
      mysql:
        condition: service_healthy

  phpmyadmin:
    image: phpmyadmin
    ports:
      - "8082:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ""
    depends_on:
      - mysql

volumes:
  mysql_data:
