services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-}"
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: "${DB_NAME:-club}"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  php-mvc:
    build: .
    ports:
      - "${PHP_MVC_PORT:-8083}:80"
    environment:
      DB_HOST: mysql
      DB_NAME: "${DB_NAME:-club}"
      DB_USER: "${DB_USER:-root}"
      DB_PASSWORD: "${DB_PASSWORD:-}"
    depends_on:
      mysql:
        condition: service_healthy

  symfony:
    build:
      context: https://github.com/bintabah/Pw.git#Symfony:projetsymfony
    ports:
      - "${SYMFONY_PORT:-8081}:80"
    environment:
      DATABASE_URL: "mysql://${DB_USER:-root}:${DB_PASSWORD:-}@mysql:3306/${DB_NAME:-club}?serverVersion=8.0&charset=utf8mb4"
      APP_ENV: "${APP_ENV:-dev}"
      APP_SECRET: "${APP_SECRET:-changeme}"
    depends_on:
      mysql:
        condition: service_healthy

  phpmyadmin:
    image: phpmyadmin
    ports:
      - "${PMA_PORT:-8082}:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: "${DB_USER:-root}"
      PMA_PASSWORD: "${DB_PASSWORD:-}"
    depends_on:
      - mysql

volumes:
  mysql_data:
